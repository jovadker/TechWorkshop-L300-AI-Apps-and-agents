name: Build and Push src Image to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
permissions:
  contents: read

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create temporary .env from GitHub secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ENV }}" ]; then
            echo "Missing required secret: ENV"
            exit 1
          fi
          printf '%s' "${{ secrets.ENV }}" > src/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image (src only)
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Remove temporary .env
        if: always()
        shell: bash
        run: rm -f src/.env
